# nginx proxy address - http://172.17.0.1:3000

name: homepage
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${SERVICE_USER:-1000}
      PGID: ${SERVICE_GROUP:-1000}
    ports:
      - '172.17.0.1:3000:3000'
    volumes:
      - './volumes/config/homepage:/app/config'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    networks:
      - homepage

networks:
  homepage:
    name: homepage
    external: false
